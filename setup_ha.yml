- [cite_start]hosts: storage_nodes [cite: 206]
  [cite_start]become: yes [cite: 206]
  [cite_start]vars: [cite: 207]
    [cite_start]virtual_ip_address: "192.168.1xx.yyy" [cite: 208]
    [cite_start]cluster_fs_resource: "cluster_fs-clone" [cite: 208]
  [cite_start]tasks: [cite: 209]
    - [cite_start]name: Crear o Actualizar el recurso de IP Virtual (VIP) [cite: 210]
      [cite_start]shell: | [cite: 210]
        [cite_start]if pcs resource status virtual_ip > /dev/null 2>&1; then [cite: 211]
          [cite_start]pcs resource update virtual_ip ip="{{ virtual_ip_address }}" [cite: 212]
        [cite_start]else [cite: 212]
          [cite_start]pcs resource create virtual_ip ocf:heartbeat:IPaddr2 ip="{{ virtual_ip_address }}" cidr_netmask="24" op monitor interval=10s timeout=20s [cite: 214, 215, 216]
        [cite_start]fi [cite: 213]
      [cite_start]run_once: true [cite: 217]

    - [cite_start]name: Configurar la colocación de la VIP [cite: 218]
      [cite_start]shell: | [cite: 219]
        # La VIP debe estar donde esté el sistema de archivos montado [cite: 220]
        [cite_start]pcs constraint colocation add virtual_ip with {{ cluster_fs_resource }} --force [cite: 220, 221]
      [cite_start]run_once: true [cite: 222]

    - [cite_start]name: Configurar el orden [cite: 223]
      [cite_start]shell: | [cite: 224]
        # No queremos que la IP responda hasta que el disco esté listo [cite: 225]
        [cite_start]pcs constraint order start {{ cluster_fs_resource }} then virtual_ip --force [cite: 225, 226]
      [cite_start]run_once: true [cite: 227]

    - [cite_start]name: Limpieza de seguridad [cite: 228]
      [cite_start]command: "pcs resource cleanup" [cite: 229]
      [cite_start]run_once: true [cite: 230]