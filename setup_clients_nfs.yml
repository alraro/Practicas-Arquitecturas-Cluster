- [cite_start]name: Configuración de Clientes NFS [cite: 253]
  [cite_start]hosts: compute_nodes [cite: 254]
  [cite_start]become: true [cite: 255]
  [cite_start]vars: [cite: 256]
    [cite_start]nfs_server_ip: "192.168.xxx.yyy" # IP HA [cite: 257]
    [cite_start]nfs_export_path: "/mnt/gfs2_storage" # Ruta en los nodos storage [cite: 258]
    [cite_start]nfs_mount_point: "/mnt/nfs_storage" [cite: 258]
  [cite_start]tasks: [cite: 259]
    - [cite_start]name: Crear el punto de montaje [cite: 260]
      [cite_start]file: [cite: 260]
        [cite_start]path: "{{ nfs_mount_point }}" [cite: 264]
        [cite_start]state: directory [cite: 265]
        [cite_start]mode: '0755' [cite: 266]

    - [cite_start]name: Montar NFS de forma persistente (fstab) [cite: 267]
      [cite_start]mount: [cite: 268]
        [cite_start]path: "{{ nfs_mount_point }}" [cite: 269]
        [cite_start]src: "{{ nfs_server_ip }}:{{ nfs_export_path }}" [cite: 270]
        [cite_start]fstype: nfs [cite: 270]
        # Usamos _netdev para que no intente montar si no hay red al arrancar [cite: 271, 272]
        [cite_start]opts: "defaults,_netdev,rw,sync" [cite: 273]
        [cite_start]state: mounted [cite: 273]

    - [cite_start]name: Verificar el estado del montaje [cite: 274]
      [cite_start]command: df -h {{ nfs_mount_point }} [cite: 275]
      [cite_start]register: nfs_check [cite: 276]
      [cite_start]changed_when: false [cite: 277]

    - [cite_start]name: Resumen del montaje [cite: 278]
      [cite_start]debug: [cite: 279]
        [cite_start]msg: "NFS montado en {{ inventory_hostname }}: {{ nfs_check.stdout }}" [cite: 280]