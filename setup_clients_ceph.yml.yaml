- [cite_start]name: Configuración del Sistema de Archivos y Clientes Ceph [cite: 459]
  [cite_start]hosts: all [cite: 459]
  [cite_start]become: true [cite: 460]
  [cite_start]vars: [cite: 461]
    [cite_start]cephfs_name: "cephfs" [cite: 462]
    [cite_start]mount_path: "/mnt/ceph_storage" [cite: 463]
    # IPs de los monitores para el montaje (Alta Disponibilidad) [cite: 464]
    [cite_start]mon_ips: "192.168.173.2:6789,192.168.173.3:6789,192.168.173.4:6789" [cite: 465]
  [cite_start]tasks: [cite: 466]
    # -- FASE 1: SERVIDOR (Ejecutar solo en storage01) [cite: 468]
    - [cite_start]name: Crear el volumen CephFS [cite: 468]
      [cite_start]command: "ceph fs volume create {{ cephfs_name }}" [cite: 469]
      [cite_start]register: fs_create [cite: 469]
      [cite_start]failed_when: [cite: 470]
        - [cite_start]fs_create.rc != 0 [cite: 471]
        - [cite_start]"'already exists' not in fs_create.stderr" [cite: 472]
      [cite_start]when: inventory_hostname == "storage01" [cite: 473]

    - [cite_start]name: Obtener la llave de admin para los clientes [cite: 474]
      [cite_start]command: ceph auth get-key client.admin [cite: 475]
      [cite_start]register: ceph_admin_key [cite: 476]
      [cite_start]when: inventory_hostname == "storage01" [cite: 477]

    - [cite_start]name: Compartir la llave con los nodos compute [cite: 478]
      [cite_start]set_fact: [cite: 478]
        [cite_start]shared_ceph_key: "{{ ceph_admin_key.stdout }}" [cite: 483]
      [cite_start]delegate_to: "{{ item }}" [cite: 484]
      [cite_start]delegate_facts: true [cite: 485]
      [cite_start]loop: "{{ groups['compute_nodes'] }}" [cite: 486]
      [cite_start]when: inventory_hostname == "storage01" [cite: 487]

    # FASE 2: CLIENTES (Ejecutar en compute_nodes) [cite: 488]
    - [cite_start]name: Crear el punto de montaje [cite: 489]
      [cite_start]file: [cite: 490]
        [cite_start]path: "{{ mount_path }}" [cite: 491]
        [cite_start]state: directory [cite: 492]
        [cite_start]mode: '0755' [cite: 493]
      [cite_start]when: inventory_hostname in groups['compute_nodes'] [cite: 494]

    - [cite_start]name: Montar CephFS de forma persistente (fstab) [cite: 495]
      [cite_start]mount: [cite: 495]
        [cite_start]path: "{{ mount_path }}" [cite: 496]
        [cite_start]src: "{{ mon_ips }}:/" [cite: 497]
        [cite_start]fstype: ceph [cite: 498]
        [cite_start]opts: "name=admin,secret={{ hostvars['storage01']['ceph_admin_key']['stdout'] }},_netdev,noatime" [cite: 499, 500]
        [cite_start]state: mounted [cite: 501]
      [cite_start]when: inventory_hostname in groups['compute_nodes'] [cite: 502]

    - [cite_start]name: Verificar montaje [cite: 503]
      [cite_start]command: df -h {{ mount_path }} [cite: 504]
      [cite_start]register: mount_check [cite: 505]
      [cite_start]when: inventory_hostname in groups['compute_nodes'] [cite: 506]

    - [cite_start]name: Mostrar resultado del montaje [cite: 507]
      [cite_start]debug: [cite: 508]
        [cite_start]var: mount_check.stdout_lines [cite: 509]
      [cite_start]when: inventory_hostname in groups['compute_nodes'] [cite: 510]