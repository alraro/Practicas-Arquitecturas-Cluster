- [cite_start]name: Configuración y Despliegue de Ceph Cluster [cite: 347]
  [cite_start]hosts: storage_nodes [cite: 348]
  [cite_start]become: true [cite: 349]
  [cite_start]vars: [cite: 350]
    [cite_start]initial_dashboard_password: "TuPasswordSeguro123" [cite: 351]
    [cite_start]proxy_quay_url: "dockreg.aclus.ac.uma.es:5001" [cite: 351]
    [cite_start]ceph_image: "quay.io/ceph/ceph:v17" [cite: 352]
  [cite_start]tasks: [cite: 353]
    # CONFIGURACIÓN DE PROXY [cite: 354]
    - [cite_start]name: Configurar mirror de Quay.io en todos los nodos de storage [cite: 355]
      [cite_start]copy: [cite: 355]
        [cite_start]dest: /etc/containers/registries.conf [cite: 356]
        [cite_start]content: | [cite: 357]
          [cite_start]unqualified-search-registries = ["quay.io"] [cite: 358]
          [cite_start][[registry]] [cite: 359]
          [cite_start]location = "quay.io" [cite: 360]
          [cite_start][[registry.mirror]] [cite: 361]
          [cite_start]location = "{{ proxy_quay_url }}" [cite: 362]
          [cite_start]insecure = true [cite: 363]

    - [cite_start]name: Asegurar que chronyd esté activo (Requisito de Ceph) [cite: 364]
      [cite_start]service: [cite: 364]
        [cite_start]name: chronyd [cite: 365]
        [cite_start]state: started [cite: 366]
        [cite_start]enabled: yes [cite: 367]

    - [cite_start]name: Capturar el hostname real de la máquina [cite: 368]
      [cite_start]command: hostname [cite: 369]
      [cite_start]register: real_hostname [cite: 370]
      [cite_start]changed_when: false [cite: 371]

    - [cite_start]name: Limpiar el disco sdb a conciencia (por si por error si ha escrito algo) [cite: 372, 373]
      [cite_start]shell: | [cite: 374]
        [cite_start]wipefs -a /dev/sdb [cite: 375]
        [cite_start]sgdisk --zap-all /dev/sdb [cite: 376]
        [cite_start]dd if=/dev/zero of=/dev/sdb bs=1M count=100 [cite: 377]
      [cite_start]delegate_to: "{{ item }}" [cite: 378]
      [cite_start]loop: "{{ groups['storage_nodes'] }}" [cite: 379]

    # BOOTSTRAP [cite: 383]
    - [cite_start]name: Ejecutar bootstrap del cluster [cite: 384]
      [cite_start]command: > [cite: 385]
        [cite_start]cephadm --image {{ ceph_image }} bootstrap [cite: 386]
        [cite_start]--mon-ip {{ hostvars['storage01']['ansible_host'] }} [cite: 387]
        [cite_start]--initial-dashboard-user admin [cite: 388]
        [cite_start]--initial-dashboard-password {{ initial_dashboard_password }} --allow-overwrite [cite: 389]
      [cite_start]args: [cite: 390]
        [cite_start]creates: /etc/ceph/ceph.conf [cite: 391]
      [cite_start]when: inventory_hostname == "storage01" [cite: 392]

    - [cite_start]name: Desactivar stack de monitoreo (Grafana/Prometheus) para ahorrar espacio [cite: 393, 394]
      [cite_start]shell: | [cite: 395]
        [cite_start]ceph orch rm prometheus [cite: 396]
        [cite_start]ceph orch rm grafana [cite: 397]
        [cite_start]ceph orch rm alertmanager [cite: 398]
      [cite_start]when: inventory_hostname == "storage01" [cite: 399]

    - [cite_start]name: Ajustar umbrales de espacio [cite: 400]
      [cite_start]shell: | [cite: 401]
        [cite_start]ceph config set global mon_data_avail_warn 3 [cite: 402]
        [cite_start]ceph config set global mon_data_avail_crit 2 [cite: 403]
      [cite_start]when: inventory_hostname == "storage01" [cite: 404]

    # GESTIÓN DE LLAVES (SSH TRUST) [cite: 405]
    - [cite_start]name: Leer llave pública de Ceph [cite: 406]
      [cite_start]slurp: [cite: 406]
        [cite_start]src: /etc/ceph/ceph.pub [cite: 407]
      [cite_start]register: ceph_pub_key [cite: 408]
      [cite_start]when: inventory_hostname == "storage01" [cite: 409]

    - [cite_start]name: Distribuir la llave pública a todos los nodos de storage [cite: 410]
      [cite_start]authorized_key: [cite: 410]
        [cite_start]user: root [cite: 411]
        [cite_start]key: "{{ hostvars['storage01']['ceph_pub_key']['content'] | b64decode }}" [cite: 412, 413]

    # EXPANSIÓN DEL CLUSTER [cite: 414]
    - [cite_start]name: Agregar nodos adicionales al orquestador [cite: 415]
      [cite_start]command: "ceph orch host add {{ hostvars[item]['real_hostname']['stdout'] }} {{ hostvars[item]['ansible_host'] }}" [cite: 415, 416]
      [cite_start]loop: "{{ groups['storage_nodes'] | reject('equalto', 'storage01') | list }}" [cite: 420]
      [cite_start]when: inventory_hostname == "storage01" [cite: 421]

    - [cite_start]name: Convertir todos los nodos en administradores (distribuir llaves y config) [cite: 422, 423]
      [cite_start]command: "ceph orch host label add {{ hostvars[item]['real_hostname']['stdout'] }} _admin" [cite: 424, 425]
      [cite_start]loop: "{{ groups['storage_nodes'] }}" [cite: 426]
      [cite_start]when: inventory_hostname == "storage01" [cite: 426]

    # ALMACENAMIENTO (OSDS) [cite: 427]
    - [cite_start]name: Esperar a que los nodos estén sincronizados [cite: 428]
      [cite_start]pause: [cite: 428]
        [cite_start]seconds: 30 [cite: 429]

    - [cite_start]name: Desplegar OSDs en /dev/sdb [cite: 430]
      [cite_start]command: "ceph orch daemon add osd {{ hostvars[item]['real_hostname']['stdout'] }}:/dev/sdb" [cite: 431, 432]
      [cite_start]loop: "{{ groups['storage_nodes'] }}" [cite: 433]
      [cite_start]when: inventory_hostname == "storage01" [cite: 434]

    - [cite_start]name: Mostrar estado final del cluster [cite: 435]
      [cite_start]command: ceph status [cite: 436]
      [cite_start]register: ceph_state [cite: 437]
      [cite_start]when: inventory_hostname == "storage01" [cite: 438]

    - [cite_start]name: Imprimir resumen [cite: 439]
      [cite_start]debug: [cite: 440]
        [cite_start]var: ceph_state.stdout_lines [cite: 441]
      [cite_start]when: inventory_hostname == "storage01" [cite: 442]