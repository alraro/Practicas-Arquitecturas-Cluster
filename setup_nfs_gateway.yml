- [cite_start]hosts: storage_nodes [cite: 159]
  [cite_start]become: yes [cite: 160]
  [cite_start]vars: [cite: 161]
    [cite_start]mount_path: "/mnt/gfs2_storage" [cite: 162]
    # IPs de tus máquinas y la de corrección [cite: 172]
    [cite_start]nfs_client_ips: [cite: 172]
      - [cite_start]"192.168.155.xxx" [cite: 176]
      - [cite_start]"192.168.1SS.XXX" [cite: 177]
      - [cite_start]"192.168.155.XXX" [cite: 178]
      - [cite_start]"192.168.1SS.XXX" [cite: 179]
  [cite_start]tasks: [cite: 163]
    - [cite_start]name: Configurar nodos a los que se exporta el NFS [cite: 164]
      [cite_start]copy: [cite: 164]
        [cite_start]dest: /etc/exports [cite: 165]
        [cite_start]content: | [cite: 166]
          [cite_start]{% for ip in nfs_client_ips %} [cite: 167]
          [cite_start]{{ mount_path }} {{ ip }}(rw,sync,no_root_squash,no_subtree_check,fsid=10) [cite: 168, 169]
          [cite_start]{% endfor %} [cite: 170]

    - [cite_start]name: Habilitar y arrancar servicios NFS [cite: 180]
      [cite_start]systemd: [cite: 181]
        [cite_start]name: nfs-server [cite: 182]
        [cite_start]state: started [cite: 183]
        [cite_start]enabled: yes [cite: 184]

    - [cite_start]name: Refrescar exportaciones [cite: 185]
      [cite_start]command: exportfs -ra [cite: 185]