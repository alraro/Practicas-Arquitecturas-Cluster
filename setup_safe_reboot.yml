- [cite_start]hosts: storage_nodes [cite: 542]
  [cite_start]become: yes [cite: 542]
  [cite_start]tasks: [cite: 543]
    - [cite_start]name: Crear el script de apagado limpio (Wrapper) [cite: 544]
      [cite_start]copy: [cite: 544]
        [cite_start]dest: /usr/local/bin/safe-reboot [cite: 545]
        [cite_start]owner: root [cite: 549]
        [cite_start]group: root [cite: 550]
        [cite_start]mode: '0755' [cite: 551]
        [cite_start]content: | [cite: 552]
          [cite_start]#!/bin/bash [cite: 553]
          # Entramos en root para que fuser no mate nuestra propia sesión [cite: 554, 555]
          [cite_start]cd /root [cite: 556]
          echo "================================================================="
          [cite_start]echo "INICIANDO APAGADO SEGURO (CLÚSTER + CEPH)" [cite: 562]
          echo "================================================================="
          # Paso A: Evitar que Ceph rebalancee datos [cite: 563]
          [cite_start]/usr/bin/ceph osd set noout > /dev/null 2>&1 [cite: 564]
          # Paso B: Intentar parada limpia de Pacemaker (20s) [cite: 566]
          [cite_start]timeout 20s /usr/sbin/pcs cluster stop [cite: 566]
          # Paso C: Si falla la parada limpia o el disco sigue montado, forzamos parada..." [cite: 567, 560]
          if [ $? [cite_start]-ne 0 ] || mountpoint -q /mnt/gfs2_storage; then [cite: 568]
            [cite_start]echo "-> Bloqueo detectado. Forzando desmontaje y parada..." [cite: 569, 560, 561]
            [cite_start]umount -l /mnt/gfs2_storage # Desmontaje "perezoso" [cite: 571]
            [cite_start]systemctl stop pacemaker corosync dlm 2>/dev/null [cite: 571]
            [cite_start]echo "-> Reiniciando con fuerza bruta..." [cite: 571]
            [cite_start]/usr/sbin/reboot -f [cite: 572]
          [cite_start]else [cite: 569]
            [cite_start]echo "-> Todo limpio. Reiniciando normalmente..." [cite: 573]
            [cite_start]/usr/sbin/reboot [cite: 573]
          [cite_start]fi [cite: 570]

    - [cite_start]name: Aplicar alias permanente para root [cite: 574]
      [cite_start]lineinfile: [cite: 574]
        [cite_start]path: /root/.bashrc [cite: 575]
        [cite_start]line: "alias reboot='/usr/local/bin/safe-reboot'" [cite: 576]
        [cite_start]regexp: "^alias reboot=" [cite: 577]
        [cite_start]state: present [cite: 578]

    - [cite_start]name: Crear script de restauración de salud de Ceph [cite: 579]
      [cite_start]copy: [cite: 580]
        [cite_start]dest: /usr/local/bin/ceph-health-restore [cite: 581]
        [cite_start]owner: root [cite: 582]
        [cite_start]group: root [cite: 583]
        [cite_start]mode: '0755' [cite: 587]
        [cite_start]content: | [cite: 588]
          [cite_start]#!/bin/bash [cite: 589]
          [cite_start]echo "Esperando a que Ceph esté listo para quitar flags de mantenimiento..." [cite: 590, 591]
          # Esperamos un poco para asegurar que los OSD locales han levantado [cite: 592, 593]
          [cite_start]sleep 30 [cite: 594]
          # Quitamos los bloqueos de rebalanceo [cite: 595]
          [cite_start]/usr/bin/ceph osd unset noout [cite: 596]
          [cite_start]/usr/bin/ceph osd unset norecover [cite: 597]
          [cite_start]echo "Ceph restaurado." [cite: 598]

    - [cite_start]name: Crear servicio Systemd para Ceph-Restore [cite: 599]
      [cite_start]copy: [cite: 600]
        [cite_start]dest: /etc/systemd/system/ceph-restore.service [cite: 601]
        [cite_start]content: | [cite: 602]
          [cite_start][Unit] [cite: 603]
          [cite_start]Description=Restaurar flags de Ceph tras reinicio seguro [cite: 604]
          [cite_start]After=network-online.target ceph-osd.target [cite: 605]
          [cite_start]Wants=network-online.target [cite: 606]
          [cite_start][Service] [cite: 607]
          [cite_start]Type=oneshot [cite: 608]
          [cite_start]RemainAfterExit=yes [cite: 609]
          [cite_start]ExecStart=/usr/local/bin/ceph-health-restore [cite: 610]
          [cite_start][Install] [cite: 611]
          [cite_start]WantedBy=multi-user.target [cite: 612]

    - [cite_start]name: Habilitar el servicio de restauración automática [cite: 613]
      [cite_start]systemd: [cite: 613]
        [cite_start]name: ceph-restore [cite: 615]
        [cite_start]enabled: yes [cite: 616]
        [cite_start]daemon_reload: yes [cite: 617]